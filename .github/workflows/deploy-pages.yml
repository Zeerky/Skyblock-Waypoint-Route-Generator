name: Deploy Showcase to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            RouteFinder/package-lock.json
            Bazaar/package-lock.json

      - name: Install RouteFinder dependencies
        working-directory: RouteFinder
        run: npm ci

      - name: Build RouteFinder
        working-directory: RouteFinder
        env:
          # Showcase root is /<repo>/, RouteFinder lives at /<repo>/routefinder/
          GITHUB_PAGES_BASE: /${{ github.event.repository.name }}/routefinder/
        run: npm run build

      - name: Install Bazaar dependencies
        working-directory: Bazaar
        run: npm ci

      - name: Build Bazaar
        working-directory: Bazaar
        env:
          GITHUB_PAGES_BASE: /${{ github.event.repository.name }}/bazaar/
        run: npm run build

      - name: Assemble Pages artifact
        run: |
          mkdir -p dist/routefinder dist/bazaar
          cp -r Showcase/* dist/
          cp -r RouteFinder/dist/* dist/routefinder/
          cp -r Bazaar/dist/* dist/bazaar/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

